<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>Evo Pixel Pet</title>

<body>



  <h1>Evo Pixel Pet</h1>
  <p id="currency">0</p>


  <canvas id="screen" width="1000" height="700"></canvas>


  <!-- BUTTONS -->
  <div id="mainBtns">
    <button id="homeBtn">
      <img src="sprite/visuals/house-button.svg">
    </button>

    <button id="inventoryBtn">
      <img src="sprite/visuals/inventory-button.svg">
    </button>

    <button id="shopBtn">
      <img src="sprite/visuals/shop-button.svg">
    </button>

    <button id="gameBtn">
      <img src="sprite/visuals/game-button.svg">
    </button>
  </div>


  <!-- POPUPS -->
  <div id="startPopup" class="popup hidden">
    <div class="popup-box">
      <p>Reach the top without moving on RED!</p>
      <button id="startBtn">Play</button>
    </div>
  </div>

  <div id="endPopup" class="popup hidden">
    <div class="popup-box">
      <p id="endText"></p>
      <button onclick="goHome()">Go Home</button>
    </div>
  </div>
